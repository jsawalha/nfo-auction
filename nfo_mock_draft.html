<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NFO 2026 Mock Draft</title>
<style>
  :root{
    --page:#f9f9f7; --surface:#fcfcfb; --surface-2:#f2f1ec; --ink:#0b0b0b; --ink-2:#52514e;
    --muted:#898781; --border:rgba(11,11,11,.12); --navy:#28345e; --red:#c0392b; --green:#0a7d3f;
    --rb:#2a78d6; --wr:#1baf7a; --qb:#eb6834; --te:#7a5cff;
    --shadow:0 1px 2px rgba(11,11,11,.04),0 4px 16px rgba(11,11,11,.05);
  }
  @media (prefers-color-scheme:dark){
    :root{--page:#0d0d0d; --surface:#1a1a19; --surface-2:#232320; --ink:#fff; --ink-2:#c3c2b7;
      --muted:#898781; --border:rgba(255,255,255,.14); --navy:#3d4d85; --red:#e66767; --green:#22b562;
      --rb:#3987e5; --wr:#199e70; --qb:#d95926; --te:#9085e9; --shadow:none;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);
       font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif}
  header{background:var(--navy);color:#fff;padding:12px 16px;text-align:center}
  header h1{margin:0;font-size:1.05rem;letter-spacing:-.01em}
  header .sub{font-size:.75rem;opacity:.8;margin-top:2px}
  .wrap{max-width:1280px;margin:0 auto;padding:12px;display:grid;
        grid-template-columns:1fr 300px 280px;gap:12px;align-items:start}
  @media(max-width:1080px){.wrap{grid-template-columns:1fr 1fr}}
  @media(max-width:720px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
        box-shadow:var(--shadow);padding:12px;margin-bottom:12px}
  .card h2{margin:0 0 8px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  #timer{font-size:2.6rem;font-weight:800;line-height:1;color:var(--red);font-variant-numeric:tabular-nums}
  #timer.safe{color:var(--green)}
  #cur{font-size:1.15rem;font-weight:700;margin-top:2px}
  #info{font-size:.8rem;color:var(--muted)}
  #bid{font-size:1rem;font-weight:700;margin-top:6px}
  #you{font-size:.82rem;color:var(--green);font-weight:600;margin-top:4px}
  .pos{display:inline-block;min-width:26px;text-align:center;font-size:.62rem;font-weight:800;
       padding:1px 4px;border-radius:4px;color:#fff}
  .pos.RB{background:var(--rb)}.pos.WR{background:var(--wr)}
  .pos.QB{background:var(--qb)}.pos.TE{background:var(--te)}
  button{font:inherit;border:1px solid var(--border);background:var(--surface);color:var(--ink);
         border-radius:7px;padding:7px 11px;cursor:pointer}
  button:hover:not(:disabled){border-color:var(--muted)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--navy);color:#fff;border-color:transparent}
  button.go{background:var(--green);color:#fff;border-color:transparent}
  .ctl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .ctl input{font:inherit;width:70px;padding:7px 8px;border:1px solid var(--border);
             border-radius:7px;background:var(--surface);color:var(--ink)}
  .jump{margin-left:18px;display:flex;gap:5px}
  .jump button{background:#e8eef7;color:#1b2b4d;border-color:transparent;font-size:.82rem;padding:7px 9px}
  @media (prefers-color-scheme:dark){.jump button{background:#2b3550;color:#dbe4f5}}
  .filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
  .filters button{padding:5px 10px;font-size:.82rem}
  .filters button.on{background:var(--navy);color:#fff;border-color:transparent}
  .scroll{max-height:330px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
  table{border-collapse:collapse;width:100%;font-size:.83rem}
  th,td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  th{position:sticky;top:0;background:var(--surface-2);font-size:.64rem;text-transform:uppercase;
     letter-spacing:.04em;color:var(--muted);z-index:1}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.sel{background:color-mix(in srgb,var(--navy) 18%,transparent);font-weight:600}
  .you-row{background:color-mix(in srgb,var(--green) 12%,transparent)}
  .log{max-height:420px;overflow-y:auto;font-size:.8rem}
  .log div{padding:4px 2px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:6px}
  .log .amt{font-variant-numeric:tabular-nums;font-weight:700}
  .mine{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.78rem;max-height:230px;overflow-y:auto}
  .mine div{padding:2px 0;display:flex;justify-content:space-between}
  .over{text-align:center;padding:20px}
  .over h3{margin:0 0 6px}
  .banner{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
          padding:10px 12px;font-size:.85rem;margin-bottom:12px}
</style>
</head>

/* ---------- rng helpers (mirrors python's random) ---------- */
const uniform=(a,b)=>a+Math.random()*(b-a);
function gauss(mu,sigma){
  let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
  return mu+sigma*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
const choice=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
  const t=a[i];a[i]=a[j];a[j]=t;} return a;}
function posCap(pos){
  const caps=[]; if(CFG.MAX_PRICE!==null)caps.push(CFG.MAX_PRICE);
  if(CFG.MAX_PRICE_BY_POS[pos]!==undefined&&CFG.MAX_PRICE_BY_POS[pos]!==null)caps.push(CFG.MAX_PRICE_BY_POS[pos]);
  return caps.length?Math.min.apply(null,caps):1e9;
}

/* ---------- GM (ports the python class) ---------- */
class GM{
  constructor(g){this.name=g.name;this.isUser=(g.name===CFG.USER);
    this.mult=g.mult;this.aggr=g.aggr;this.budget=CFG.BUDGET;this.roster=[];}
  count(pos){return this.roster.filter(p=>p.pos===pos).length;}
  slotsLeft(){return CFG.ROSTER_MAX-this.roster.length;}
  maxBid(){return this.budget-Math.max(this.slotsLeft()-1,0);}
  unmetRequired(){const o={};for(const k in CFG.REQ)o[k]=Math.max(0,CFG.REQ[k]-this.count(k));return o;}
  full(){return this.roster.length>=CFG.ROSTER_MAX;}
  need(pos){const c=this.count(pos);
    if(c>=CFG.SOFT_CAP[pos])return 0.15;
    if(c<CFG.REQ[pos])return 1.08;
    return 0.90;}
  wtp(player){
    if(this.full())return 0;
    const pos=player.pos, unmet=this.unmetRequired();
    let tot=0; for(const k in unmet)tot+=unmet[k];
    if(this.slotsLeft()<=tot && (unmet[pos]||0)<=0)return 0;
    const mv=(player.mv!==undefined)?player.mv:player.price;
    let w=mv*(this.mult[pos]||1.0)*this.need(pos)*this.aggr*CFG.AI_AGGRESSION;
    w*=uniform(1-CFG.NOISE_WIDTH,1+CFG.NOISE_WIDTH);
    w=Math.min(w,mv*CFG.MAX_OVERPAY);
    w=Math.round(w);
    if(player.blo!==undefined){
      w=Math.min(w,player.bhi);
      if(this.need(pos)>=0.5)w=Math.max(w,Math.min(player.blo,this.maxBid()));
    }
    return Math.max(1,Math.min(w,this.maxBid(),posCap(pos)));
  }
}

/* ---------- Engine ---------- */
class Engine{
  constructor(){
    this.players=PLAYERS.map(p=>Object.assign({},p));
    this.gms=shuffle(CFG.GMS.slice()).map(g=>new GM(g));
    this.byName={}; this.gms.forEach(g=>this.byName[g.name]=g);
    this.user=this.byName[CFG.USER];
    this.available=this.players.slice();
    this.nomI=0;
  }
  nextNominator(){
    for(let i=0;i<this.gms.length;i++){
      const g=this.gms[this.nomI%this.gms.length]; this.nomI++;
      if(!g.full())return g;
    }
    return null;
  }
  aiNominate(gm){
    const wanted=this.available.filter(p=>gm.need(p.pos)>=0.5&&gm.count(p.pos)<CFG.SOFT_CAP[p.pos]);
    const pool=(wanted.length?wanted:this.available).slice().sort((a,b)=>a.adp-b.adp).slice(0,8);
    return pool.length?choice(pool):null;
  }
  band(player){
    if(player.blo===undefined){
      let lo=(player.p25!==undefined)?player.p25:1;
      let hi=(player.p75!==undefined)?player.p75:player.price;
      const r=Math.random();
      if(r<CFG.BAND_MISS/2)      lo=Math.max(1,Math.round(lo*0.70));
      else if(r>1-CFG.BAND_MISS/2) hi=(player.p90!==undefined)?player.p90:hi;
      if(!CFG.BAND_ENFORCE){lo=1;hi=posCap(player.pos);}
      player.blo=Math.max(1,lo); player.bhi=Math.max(1,hi);
    }
    return [player.blo,player.bhi];
  }
  marketValue(player){
    if(player.mv===undefined){
      const mv=gauss(player.price,player.std*CFG.PRICE_NOISE);
      player.mv=Math.max(1,Math.min(Math.round(mv),posCap(player.pos)));
    }
    return player.mv;
  }
  cacheWtps(player){
    this.band(player); this.marketValue(player);
    const o={}; this.gms.forEach(g=>{if(!g.full())o[g.name]=g.wtp(player);});
    return o;
  }
  settle(gm,player,price){
    const b=this.band(player), blo=b[0], bhi=b[1];
    price=Math.max(1,Math.min(Math.round(price),bhi));
    if(price<blo)price=Math.min(blo,gm.maxBid());
    return Math.max(1,Math.min(price,gm.maxBid(),posCap(player.pos)));
  }
  award(gm,player,price){
    const pl=Object.assign({},player); pl.paid=price;
    gm.roster.push(pl); gm.budget-=price;
    this.available=this.available.filter(p=>p.name!==player.name);
  }
  done(){return this.gms.every(g=>g.full())||this.available.length===0;}
}

    '<tr data-n="'+esc(p.name)+'" class="'+(S.sel===p.name?'sel':'')+'">'+
    '<td>'+esc(p.name)+'</td><td>'+esc(p.team)+'</td>'+
    '<td><span class="pos '+p.pos+'">'+p.pos+'</span></td>'+
    '<td class="num">'+p.adp+'</td><td class="num">$'+p.price+'</td></tr>').join('');
}
function renderGMs(){
  $('gms').innerHTML=eng.gms.map(g=>
    '<tr class="'+(g.isUser?'you-row':'')+'"><td>'+(g.isUser?'&#9733; ':'')+esc(g.name)+'</td>'+
    '<td class="num">$'+g.budget+'</td><td class="num">'+g.roster.length+'/14</td></tr>').join('');
  const u=eng.user;
  $('you').textContent='YOU  $'+u.budget+' left  '+u.roster.length+'/14  max bid $'+u.maxBid()+
    '   RB'+u.count('RB')+' WR'+u.count('WR')+' QB'+u.count('QB')+' TE'+u.count('TE');
  const sorted=u.roster.slice().sort((a,b)=>a.pos===b.pos?b.paid-a.paid:a.pos.localeCompare(b.pos));
  $('mine').innerHTML=sorted.map(p=>'<div><span>'+
    '<span class="pos '+p.pos+'">'+p.pos+'</span> '+esc(p.name)+'</span><b>$'+p.paid+'</b></div>').join('')
    || '<div style="color:var(--muted)">nothing yet</div>';
}
function logPick(gm,player,price){
  const d=document.createElement('div');
  d.innerHTML='<span>'+esc(gm.name)+' &mdash; '+esc(player.name)+
    ' <span class="pos '+player.pos+'">'+player.pos+'</span></span><span class="amt">$'+price+'</span>';
  if(gm.isUser)d.style.background='color-mix(in srgb,var(--green) 14%,transparent)';
  $('picks').insertBefore(d,$('picks').firstChild);
}
function userCap(){
  return Math.min(eng.user.maxBid(), S.player?posCap(S.player.pos):1e9);
}
function renderCtl(){
  const u=eng.user;
  if(S.phase==='nominate'){
    $('ctl').innerHTML='<button class="primary" id="nomBtn">Nominate selected &#9656;</button>'+
      '<span style="font-size:.8rem;color:var(--muted)">pick a player from the list below</span>';
    $('nomBtn').disabled=!S.sel;
    $('nomBtn').onclick=()=>{const p=eng.available.find(x=>x.name===S.sel); if(p)startAuction(p,eng.user);};
    return;
  }
  const cap=userCap();
  const can=S.active&&!S.satOut&&!u.full()&&S.leader!==u&&cap>=S.price+1;
  $('ctl').innerHTML=
    '<input id="amt" type="number" min="'+(S.price+1)+'" max="'+Math.max(cap,S.price+1)+'" value="'+(S.price+1)+'">'+
    '<button class="go" id="bidBtn">Bid &#9650;</button>'+
    '<button id="skipBtn">'+(S.satOut?'Sat out &#10003;':'Sit out &raquo;')+'</button>'+
    '<span class="jump">'+[5,10,15].map(a=>'<button data-j="'+a+'">+$'+a+'</button>').join('')+'</span>';
  $('amt').disabled=!can; $('bidBtn').disabled=!can;
  $('skipBtn').disabled=!(S.active&&!S.satOut);
  $('bidBtn').onclick=userBid;
  $('skipBtn').onclick=()=>{if(S.active){S.satOut=true;renderCtl();}};
  document.querySelectorAll('[data-j]').forEach(b=>{
    const amt=+b.dataset.j, target=S.price+amt;
    b.disabled=!can||target>cap;
    if(b.disabled&&can)b.textContent='✕';
    b.onclick=()=>{if(!can||target>cap)return; S.engaged=true; placeBid(eng.user,target);};
  });
}
function updateBidLbl(){
  const led=S.leader;
  $('bid').innerHTML='High bid: <b>$'+S.price+'</b> &mdash; '+esc(led.name)+(led.isUser?'  <b>(YOU)</b>':'');
  $('bid').style.color=led.isUser?'var(--green)':'';
}

/* ---------- turn flow ---------- */
function nextTurn(){
  renderAvail(); renderGMs();
  if(eng.done())return finish();
  const gm=eng.nextNominator();
  if(!gm)return finish();
  S.nominator=gm;
  if(gm.isUser){
    S.phase='nominate'; S.active=false;
    $('timer').textContent='—'; $('timer').className='';
    $('cur').textContent='YOUR NOMINATION'; $('cur').style.color='var(--green)';
    $('info').textContent='Pick a player from the list, then click Nominate.';
    $('bid').textContent='';
    renderCtl();
  }else{
    const p=eng.aiNominate(gm);
    if(!p)return finish();
    startAuction(p,gm);
  }
}
function startAuction(player,nominator){
  S.phase='bidding'; S.player=player; S.nominator=nominator;
  S.wtps=eng.cacheWtps(player); S.price=1; S.leader=nominator;
  S.timer=CFG.TIMER_START; S.active=true;
  S.engaged=(nominator===eng.user); S.satOut=false; S.sel=null;
  $('cur').innerHTML='<span class="pos '+player.pos+'">'+player.pos+'</span> '+esc(player.name);
  $('cur').style.color='';
  $('info').textContent=player.team+' · ADP '+player.adp+' · model $'+player.price+
    ' (±'+Math.round(player.std)+')   ['+nominator.name+' nominated]';
  updateBidLbl(); renderCtl(); renderAvail();
  if(tickHandle)clearTimeout(tickHandle);
  tick();
}
function placeBid(gm,amt){
  S.price=amt; S.leader=gm; S.timer=CFG.TIMER_START;
  updateBidLbl(); renderCtl();
}
function tick(){
  if(!S.active)return;
  const price=S.price, leader=S.leader, u=eng.user;
  const challengers=eng.gms.filter(g=>g!==leader&&!g.isUser&&!g.full()&&
    (S.wtps[g.name]||0)>=price+1&&g.maxBid()>=price+1);
  const userCan=!S.satOut&&!u.full()&&leader!==u&&u.maxBid()>=price+1;
  const effEngaged=S.engaged&&!S.satOut;
  if(!challengers.length&&!userCan&&!effEngaged)return finalize();
  if(challengers.length&&Math.random()<CFG.BID_PACING){
    let best=challengers[0];
    challengers.forEach(g=>{if(S.wtps[g.name]>S.wtps[best.name])best=g;});
    placeBid(best,price+1);
  }else{
    S.timer-=0.1;
  }
  if(S.timer<=0)return finalize();
  $('timer').textContent=Math.max(S.timer,0).toFixed(1)+'s';
  $('timer').className=S.timer>3?'safe':'';
  tickHandle=setTimeout(tick,100);
}
function userBid(){
  if(!S.active)return;
  const amt=parseInt($('amt').value,10);
  if(isNaN(amt)||amt<=S.price||amt>userCap())return;
  S.engaged=true; placeBid(eng.user,amt);
}
function finalize(){
  if(!S.active)return;
  S.active=false;
  if(tickHandle)clearTimeout(tickHandle);
  const gm=S.leader, player=S.player;
  const price=eng.settle(gm,player,S.price);
  S.price=price;
  eng.award(gm,player,price);
  logPick(gm,player,price);
  $('timer').textContent='✔'; $('timer').className='safe';
  $('bid').innerHTML='<b>SOLD:</b> '+esc(player.name)+' → '+esc(gm.name)+' for <b>$'+price+'</b>';
  $('bid').style.color=gm.isUser?'var(--green)':'var(--red)';
  renderCtl(); renderGMs();
  setTimeout(nextTurn,900);
}
function finish(){
  S.active=false; S.phase='over';
  if(tickHandle)clearTimeout(tickHandle);
  const u=eng.user, by={RB:0,WR:0,QB:0,TE:0};
  u.roster.forEach(p=>by[p.pos]+=p.paid);
  $('timer').textContent='OVER'; $('timer').className='';
  $('cur').textContent='DRAFT COMPLETE';
  $('info').textContent='You spent $'+(CFG.BUDGET-u.budget)+' · RB $'+by.RB+
    ' WR $'+by.WR+' QB $'+by.QB+' TE $'+by.TE;
  $('bid').textContent='Winning template ≈ RB $100 · WR $80 · QB $8 · TE $8';
  $('bid').style.color='';
  $('ctl').innerHTML='<button class="primary" onclick="location.reload()">Draft again ↻</button>';
}

/* ---------- events ---------- */
$('filters').addEventListener('click',e=>{
  const b=e.target.closest('[data-f]'); if(!b)return;
  S.filter=b.dataset.f; renderFilters(); renderAvail();
});
$('avail').addEventListener('click',e=>{
  const tr=e.target.closest('tr'); if(!tr)return;
  S.sel=tr.dataset.n; renderAvail(); if(S.phase==='nominate')renderCtl();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&S.phase==='bidding'&&S.active)userBid();
});

renderFilters(); renderAvail(); renderGMs();
setTimeout(nextTurn,500);
</script>
</body>
</html>
